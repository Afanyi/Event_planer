stages: [test, build]

# ============ TEST (backend unit tests) ============
test_backend:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --no-audit --no-fund
    # JUnit path for unit tests (matches jest-junit config in package.json)
    - export JEST_JUNIT_OUTPUT=reports/junit.xml
  script:
    # Run unit tests only (jest.config.ts)
    - npm run test:unit -- --coverageReporters=cobertura
  artifacts:
    when: always
    reports:
      junit: backend/reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage/unit/cobertura-coverage.xml
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============ TEST (backend integration tests) ============
test_backend_int:
  stage: test
  image: node:20 # Debian-based; needed for mongodb-memory-server download
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --no-audit --no-fund
    # Separate JUnit file for integration tests
    - export JEST_JUNIT_OUTPUT=reports/junit-int.xml
  script:
    # Run integration tests only (jest.int.config.ts)
    - npm run test:int -- --coverageReporters=cobertura
  artifacts:
    when: always
    reports:
      junit: backend/reports/junit-int.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage/integration/cobertura-coverage.xml
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============ TEST (frontend unit tests) ============
test_frontend:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund
    # JUnit file path relative to current working dir (frontend/)
    # jest-junit default in package.json writes to reports/junit.xml
  script:
    # Run ONLY unit tests in src/tests/unit
    - npm run test:ci -- --testPathPattern="src/tests/unit"
  artifacts:
    when: always
    reports:
      junit: frontend/reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============ TEST (frontend integration tests) ============
test_frontend_int:
  stage: test
  image: node:20
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund
    # JUnit file path relative to current working dir (frontend/)
    - export JEST_JUNIT_OUTPUT=reports/junit-int.xml
  script:
    # Run ONLY integration tests under src/tests/integration
    - npx jest --ci --coverage --reporters=default --reporters=jest-junit --testPathPattern="src/tests/integration" --coverageDirectory coverage-int --passWithNoTests
  artifacts:
    when: always
    reports:
      junit: frontend/reports/junit-int.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage-int/cobertura-coverage.xml
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============ BACKEND (Kaniko) ============
build_backend_mr:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    DOCKERFILE: "backend/Dockerfile"
    CONTEXT: "$CI_PROJECT_DIR/backend"
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"gitlab-ci-token\",\"password\":\"$CI_JOB_TOKEN\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CONTEXT" --dockerfile "$DOCKERFILE" --cache=true --cache-repo "$CI_REGISTRY_IMAGE/cache" --no-push
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

build_backend_main:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    DOCKERFILE: "backend/Dockerfile"
    CONTEXT: "$CI_PROJECT_DIR/backend"
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"gitlab-ci-token\",\"password\":\"$CI_JOB_TOKEN\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CONTEXT" --dockerfile "$DOCKERFILE" --cache=true --cache-repo "$CI_REGISTRY_IMAGE/cache" --destination "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" --destination "$CI_REGISTRY_IMAGE/backend:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============ FRONTEND (Kaniko) ============
build_frontend_mr:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    DOCKERFILE: "frontend/Dockerfile"
    CONTEXT: "$CI_PROJECT_DIR/frontend"
    VITE_API_BASE: "http://localhost:4000/api"
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"gitlab-ci-token\",\"password\":\"$CI_JOB_TOKEN\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CONTEXT" --dockerfile "$DOCKERFILE" --cache=true --cache-repo "$CI_REGISTRY_IMAGE/cache" --build-arg VITE_API_BASE="$VITE_API_BASE" --no-push
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

build_frontend_main:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    DOCKERFILE: "frontend/Dockerfile"
    CONTEXT: "$CI_PROJECT_DIR/frontend"
    VITE_API_BASE: "http://localhost:4000/api"
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"gitlab-ci-token\",\"password\":\"$CI_JOB_TOKEN\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CONTEXT" --dockerfile "$DOCKERFILE" --cache=true --cache-repo "$CI_REGISTRY_IMAGE/cache" --build-arg VITE_API_BASE="$VITE_API_BASE" --destination "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" --destination "$CI_REGISTRY_IMAGE/frontend:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
