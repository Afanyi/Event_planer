services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Wenn du von Host/Compass zugreifen willst, nutze 27018 auf Loopback:
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build: ./backend
    env_file:
      - ./backend/.env         # ← lädt Variablen aus backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eventsdb
      PORT: "4000"
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped
    # (keine profiles -> startet standardmäßig mit)

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:4000/api}
    depends_on:
      - backend
    ports:
      - "5173:80" # Host 5173 -> nginx:80
    restart: unless-stopped
    # (keine profiles -> startet standardmäßig mit)


volumes:
  mongo_data:
