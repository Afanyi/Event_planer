version: "3.9"
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/eventsdb
      - PORT=4000
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongo
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    environment:
      - VITE_API_BASE=http://localhost:4000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
